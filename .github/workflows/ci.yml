name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  python-checks:
    name: Python checks (optional)
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install requirements (if present)
        run: |
          if [ -f python/requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r python/requirements.txt
          else
            echo "No python/requirements.txt, skipping"
          fi

      - name: Optional lint (flake8)
        run: |
          if [ -f python/requirements.txt ] && grep -q "flake8" python/requirements.txt; then
            pip install flake8
            flake8 || true
          else
            echo "flake8 not configured in requirements, skipping"
          fi
